<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Distraction Blocker — Options</title>
 <style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    font-family: "Segoe UI", sans-serif;
  }

  .card {
    background: white;
    width: 100%;
    max-width: 520px;
    padding: 28px 30px;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    animation: slideIn 0.9s ease;
  }

  h2 {
    margin-top: 0;
    text-align: center;
    color: #333;
  }

  label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    font-size: 1rem;
    color: #444;
  }

  h3 {
    margin-top: 24px;
    color: #333;
  }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 1rem;
  }

  .row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 8px;
  }

  button {
    padding: 10px 16px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  ul {
    list-style: none;
    padding: 0;
    margin-top: 10px;
  }

  li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
  }

  li button {
    background: #e53935;
  }

  #save {
    width: 100%;
    margin-top: 20px;
  }

  #status {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: green;
    font-size: 0.9rem;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

</head>
<body>
  <div class="card">
    <h2>Distraction Blocker — Options</h2>

    <label>
      <input type="checkbox" id="enabled" />
      Enable extension
    </label>

    <h3>Default session duration</h3>
    <div class="row">
      <input type="number" id="defaultHours" min="0" /> hours
      <input type="number" id="defaultMinutes" min="0" /> minutes
    </div>

    <h3>Blocked sites</h3>
    <input id="newDomain" type="text" placeholder="e.g. facebook.com" />
    <button id="addDomain" style="margin-top:10px">Add site</button>

    <ul id="blacklist"></ul>

    <button id="save">Save Options</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>

</html>
