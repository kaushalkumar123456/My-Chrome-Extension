<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Distraction Blocker</title>
  <style>
    body { font-family: Arial, sans-serif; width: 260px; padding: 12px; }
    .row { margin-bottom: 8px; display:flex; gap:8px; align-items:center; }
    input[type="number"] { width: 60px; }
    button { padding:6px 10px; cursor:pointer; }
    #status { font-size: 13px; color: #444; margin-bottom:8px; }
    a { font-size: 13px; text-decoration:none; color:#1a73e8; }
  </style>
</head>
<body>
  <h3 style="margin:0 0 8px 0">Distraction Blocker</h3>

  <div id="status">Loading status...</div>

  <div class="row">
    <label>Hours</label>
    <input id="hours" type="number" min="0" value="0" />
    <label>Minutes</label>
    <input id="minutes" type="number" min="0" value="25" />
  </div>

  <div class="row">
    <button id="start">Start Session</button>
    <button id="stop">Stop</button>
  </div>

  <div style="margin-top:8px">
    <a id="openOptions" href="#">Open Options</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
